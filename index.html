<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Baby Monitor Tracker</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./icon.svg">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* Mobile-first enhancements */
        body {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior-y: none;
            background-color: #f8fafc;
            color: #0f172a;
        }

        /* Allow inputs to be selectable/typeable */
        input,
        textarea,
        select {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* Smooth animations */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hide scrollbars for cleaner look */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="antialiased font-sans flex flex-col h-screen overflow-hidden">
    <div id="root" class="h-full w-full max-w-md mx-auto relative bg-white shadow-2xl flex flex-col"></div>

    <script>
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker registered'))
                    .catch(error => console.log('ServiceWorker registration failed:', error));
            });
        }
    </script>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const getLocalStorage = (key, defaultVal) => {
            try { return JSON.parse(localStorage.getItem(key)) || defaultVal; }
            catch (e) { return defaultVal; }
        };

        const setLocalStorage = (key, val) => localStorage.setItem(key, JSON.stringify(val));

        const dateFns = {
            differenceInDays: (a, b) => Math.floor((a - b) / (1000 * 60 * 60 * 24)),
            differenceInHours: (a, b) => Math.floor((a - b) / (1000 * 60 * 60)),
            differenceInMinutes: (a, b) => Math.floor((a - b) / (1000 * 60)),
            isSameDay: (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(),
            isPast: (d) => d < new Date(),
            format: (d, fmt) => {
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                let h = d.getHours();
                const m = d.getMinutes().toString().padStart(2, '0');
                const ampm = h >= 12 ? 'pm' : 'am';
                h = h % 12;
                h = h ? h : 12;
                return `${months[d.getMonth()]} ${d.getDate()}, ${h}:${m} ${ampm}`;
            },
            addHours: (d, h) => new Date(d.getTime() + h * 60 * 60 * 1000)
        };

        // ----- ICONS ----- //
        const IconHome = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>);
        const IconBottle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>);
        const IconDiaper = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 6l3 1-3 1v12a2 2 0 002 2h14a2 2 0 002-2V8l-3-1 3-1V4a2 2 0 00-2-2H5a2 2 0 00-2 2v2zm7 5v4h4v-4h-4z" /></svg>);
        const IconPill = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>);
        const IconChartBar = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>);

        // ----- FIREBASE INIT ----- //
        const firebaseConfig = {
            apiKey: "AIzaSyCGO9jPi176sVdmUTZi6UFJNmlVxfmE_io",
            authDomain: "baby-7b2dd.firebaseapp.com",
            projectId: "baby-7b2dd",
            storageBucket: "baby-7b2dd.firebasestorage.app",
            messagingSenderId: "483820725262",
            appId: "1:483820725262:web:681ee00e076a80b26d085f"
        };

        let app, auth, db;
        try {
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            db.settings({ experimentalAutoDetectLongPolling: true }); // better for offline/mobile
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        function requestNotification() {
            if ('Notification' in window && Notification.permission !== 'granted') {
                Notification.requestPermission();
            }
        }

        function notify(title, options) {
            if ('Notification' in window && Notification.permission === 'granted') {
                if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification(title, options);
                    });
                } else {
                    new Notification(title, options);
                }
            }
        }

        function timeAgo(date) {
            if (!date) return "Never";
            const minutes = dateFns.differenceInMinutes(new Date(), new Date(date));
            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            const remMinutes = minutes % 60;
            if (hours < 24) return `${hours}h ${remMinutes}m ago`;
            return dateFns.format(new Date(date), 'MMM d, h:mm a');
        }

        // ----- COMPONENTS ----- //

        function Onboarding({ onSave }) {
            const [name, setName] = useState('');
            const [dob, setDob] = useState('');
            const [weight, setWeight] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({ name, dob, birthWeight: weight, currentWeight: weight });
            };

            return (
                <div className="flex flex-col h-full justify-center p-8 bg-gradient-to-br from-blue-50 to-indigo-50 slide-up">
                    <div className="bg-white rounded-3xl shadow-xl p-8 max-w-sm w-full mx-auto">
                        <div className="flex justify-center mb-6">
                            <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-4xl shadow-inner">
                                👶
                            </div>
                        </div>
                        <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 text-center mb-2">Welcome</h2>
                        <p className="text-gray-500 text-center mb-8">Let's set up your baby's profile</p>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Baby's Name</label>
                                <input required type="text" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Leo" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
                                <input required type="date" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm" value={dob} onChange={e => setDob(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Birth Weight (kg)</label>
                                <input required type="number" step="0.01" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm" value={weight} onChange={e => setWeight(e.target.value)} placeholder="e.g. 3.2" />
                            </div>

                            <button type="submit" className="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all mt-6">
                                Start Tracking
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ profile, feeds, diapers, medLogs, medications }) {
            // Calc age
            const ageDays = profile?.dob ? dateFns.differenceInDays(new Date(), new Date(profile.dob)) : 0;
            const ageWeeks = Math.floor(ageDays / 7);
            const ageMonths = Math.floor(ageDays / 30.44);

            // Suggested amount based on QLD Health Guidelines
            let suggestedDailyText = "";
            let suggestedPerFeedText = "";
            let dailyTargetNum = 0;

            if (ageDays <= 3) {
                dailyTargetNum = 100;
                suggestedDailyText = "up to 100 ml";
                suggestedPerFeedText = "~12";
            } else if (ageDays < 14) {
                dailyTargetNum = 500;
                suggestedDailyText = "500 ml";
                suggestedPerFeedText = "~62";
            } else {
                dailyTargetNum = 750;
                suggestedDailyText = "750-1000 ml";
                suggestedPerFeedText = "94-125";
            }

            // Last Feed
            const lastFeed = feeds.length > 0 ? feeds[0] : null;
            const lastDiaper = diapers.length > 0 ? diapers[0] : null;

            // Total amount eaten today (ml)
            const today = new Date();
            const eatenToday = feeds.reduce((sum, f) => {
                if (dateFns.isSameDay(new Date(f.timestamp), today) && f.volume) {
                    return sum + parseInt(f.volume);
                }
                return sum;
            }, 0);

            let remainingToday = dailyTargetNum - eatenToday;
            if (remainingToday < 0) remainingToday = 0;

            // Next med
            let nextMed = null;
            let nextMedTime = null;
            if (medications.length > 0) {
                // find med with closest nextDoseTime
                medications.forEach(med => {
                    const logs = medLogs.filter(l => l.medId === med.id).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    const lastLog = logs[0];
                    const dueTime = lastLog ? new Date(lastLog.nextDoseTime) : null;
                    if (dueTime && (!nextMedTime || dueTime < nextMedTime)) {
                        nextMedTime = dueTime;
                        nextMed = med;
                    } else if (!dueTime && !nextMedTime) { // hasn't taken yet
                        nextMedTime = new Date();
                        nextMed = med;
                    }
                });
            }

            const medDueText = nextMedTime ? (
                dateFns.isPast(nextMedTime) ? "Due Now!" : `In ${dateFns.differenceInHours(nextMedTime, new Date())}h ${dateFns.differenceInMinutes(nextMedTime, new Date()) % 60}m`
            ) : "No meds scheduled";

            return (
                <div className="p-6 pb-24 h-full overflow-y-auto w-full bg-gray-50 fade-in">
                    {/* Header section */}
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-3xl font-extrabold text-gray-900">{profile?.name}</h1>
                            <p className="text-sm text-gray-500 font-medium">
                                {ageMonths > 0 ? `${ageMonths} months` : ageWeeks > 0 ? `${ageWeeks} wks, ${ageDays % 7} days` : `${ageDays} days old`}
                                &nbsp;•&nbsp;{profile?.currentWeight} kg
                            </p>
                        </div>
                        <div className="w-14 h-14 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-full flex items-center justify-center text-white text-2xl shadow-lg border-2 border-white">
                            👶
                        </div>
                    </div>

                    {/* Smart Suggestions */}
                    <div className="bg-gradient-to-r from-teal-400 to-emerald-500 rounded-2xl p-5 text-white shadow-lg mb-6">
                        <div className="flex items-center space-x-3 mb-2">
                            <div className="p-2 bg-white/20 rounded-lg">
                                <IconBottle className="w-6 h-6 text-white" />
                            </div>
                            <h3 className="font-bold text-lg">Daily Targets</h3>
                        </div>
                        <p className="text-emerald-50 text-sm mb-4">Based on QLD Health guidelines</p>

                        <div className="mb-4">
                            <div className="text-3xl font-black leading-none mb-1">{suggestedPerFeedText} <span className="text-lg font-medium">ml</span></div>
                            <div className="text-xs font-medium text-emerald-100">Per feed (Assuming 8 feeds/day)</div>
                        </div>

                        <div className="bg-white/10 rounded-xl p-3 space-y-2">
                            <div className="flex justify-between items-center text-sm">
                                <span className="text-emerald-50">Assumed Daily Target:</span>
                                <span className="font-bold">{suggestedDailyText}</span>
                            </div>
                            <div className="flex justify-between items-center text-sm border-t border-emerald-400/30 pt-2">
                                <span className="text-emerald-50">Remaining to target:</span>
                                <span className="font-bold">{remainingToday > 0 ? `${remainingToday} ml` : 'Goal reached! 🎉'}</span>
                            </div>
                        </div>
                    </div>

                    {/* Grid Stats */}
                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                            <div className="flex items-center text-blue-500 mb-2">
                                <IconBottle className="w-5 h-5 mr-1" />
                                <span className="font-semibold text-sm">Last Feed</span>
                            </div>
                            <span className="text-2xl font-bold text-gray-800">{timeAgo(lastFeed?.timestamp)}</span>
                            <span className="text-xs text-gray-400 mt-1">{eatenToday} ml total today</span>
                        </div>

                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                            <div className="flex items-center text-yellow-500 mb-2">
                                <IconDiaper className="w-5 h-5 mr-1" />
                                <span className="font-semibold text-sm">Last Diaper</span>
                            </div>
                            <span className="text-2xl font-bold text-gray-800">{timeAgo(lastDiaper?.timestamp)}</span>
                            <span className="text-xs text-gray-400 mt-1 capitalize">{lastDiaper?.type || 'No data'}</span>
                        </div>
                    </div>

                    {/* Medical Alert */}
                    <div className="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-indigo-500 flex items-center justify-between">
                        <div>
                            <div className="flex items-center text-indigo-500 mb-1">
                                <IconPill className="w-5 h-5 mr-1" />
                                <span className="font-semibold text-sm">Next Med: {nextMed?.name || '---'}</span>
                            </div>
                            <p className={`font-bold ${dateFns.isPast(nextMedTime) ? 'text-red-500' : 'text-gray-800'}`}>{medDueText}</p>
                        </div>
                    </div>
                </div>
            );
        }

        function FeedTracker({ familyId, feeds }) {
            const [tab, setTab] = useState('breast'); // breast, pumped, formula
            const [volume, setVolume] = useState('');

            // Simple timer logic for breastfeeding
            const [leftTime, setLeftTime] = useState(0);
            const [rightTime, setRightTime] = useState(0);
            const [activeTimer, setActiveTimer] = useState(null); // 'left' or 'right'
            const [manualTime, setManualTime] = useState('');

            useEffect(() => {
                let interval = null;
                if (activeTimer) {
                    interval = setInterval(() => {
                        if (activeTimer === 'left') setLeftTime(t => t + 1);
                        else setRightTime(t => t + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [activeTimer]);

            const saveFeed = (data) => {
                const timestamp = manualTime ? new Date(manualTime).toISOString() : new Date().toISOString();
                db.collection('families').doc(familyId).collection('feeds').add({ timestamp, ...data });

                setVolume('');
                setLeftTime(0);
                setRightTime(0);
                setActiveTimer(null);
                setManualTime('');
            };

            const deleteFeed = (id) => {
                if (confirm('Delete this feed?')) {
                    db.collection('families').doc(familyId).collection('feeds').doc(id).delete();
                }
            };

            const formatS = (secs) => `${Math.floor(secs / 60).toString().padStart(2, '0')}:${(secs % 60).toString().padStart(2, '0')}`;

            return (
                <div className="p-6 pb-24 h-full overflow-y-auto fade-in">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800">Feeding</h2>

                    <div className="flex bg-gray-100 rounded-xl p-1 mb-6">
                        <button onClick={() => setTab('breast')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${tab === 'breast' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>Breast</button>
                        <button onClick={() => setTab('pumped')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${tab === 'pumped' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>Pumped</button>
                        <button onClick={() => setTab('formula')} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${tab === 'formula' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>Formula</button>
                    </div>

                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8">
                        {tab === 'breast' && (
                            <div>
                                <div className="flex justify-between gap-4 mb-6">
                                    <div className="flex-1 flex flex-col items-center">
                                        <span className="text-gray-500 font-medium mb-2">Left</span>
                                        <span className="text-3xl font-mono font-bold text-gray-800 mb-4">{formatS(leftTime)}</span>
                                        <button
                                            onClick={() => setActiveTimer(activeTimer === 'left' ? null : 'left')}
                                            className={`w-16 h-16 rounded-full flex items-center justify-center font-bold text-white transition-all shadow-md ${activeTimer === 'left' ? 'bg-red-500 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'}`}>
                                            {activeTimer === 'left' ? 'Stop' : 'Start'}
                                        </button>
                                    </div>
                                    <div className="flex-1 flex flex-col items-center">
                                        <span className="text-gray-500 font-medium mb-2">Right</span>
                                        <span className="text-3xl font-mono font-bold text-gray-800 mb-4">{formatS(rightTime)}</span>
                                        <button
                                            onClick={() => setActiveTimer(activeTimer === 'right' ? null : 'right')}
                                            className={`w-16 h-16 rounded-full flex items-center justify-center font-bold text-white transition-all shadow-md ${activeTimer === 'right' ? 'bg-red-500 animate-pulse' : 'bg-pink-500 hover:bg-pink-600'}`}>
                                            {activeTimer === 'right' ? 'Stop' : 'Start'}
                                        </button>
                                    </div>
                                </div>
                                <div className="mt-6 border-t border-gray-100 pt-4 mb-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Estimated Volume (ml) <span className="text-gray-400 font-normal">- Optional</span></label>
                                    <input type="number" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 text-lg outline-none bg-gray-50" value={volume} onChange={e => setVolume(e.target.value)} placeholder="0" />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Custom Time <span className="text-gray-400 font-normal">- Optional (defaults to now)</span></label>
                                    <input type="datetime-local" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 bg-gray-50 outline-none" value={manualTime} onChange={e => setManualTime(e.target.value)} />
                                </div>
                                <button
                                    disabled={(leftTime === 0 && rightTime === 0) && !volume}
                                    onClick={() => saveFeed({ type: 'breast', leftTime, rightTime, volume })}
                                    className="w-full py-3 bg-gray-900 text-white rounded-xl font-bold shadow-md disabled:opacity-50">
                                    Save Breastfeed
                                </button>
                            </div>
                        )}
                        {(tab === 'pumped' || tab === 'formula') && (
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Volume (ml)</label>
                                <input type="number" className="w-full px-4 py-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 text-xl font-bold outline-none mb-4 bg-gray-50" value={volume} onChange={e => setVolume(e.target.value)} placeholder="0" />
                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Custom Time <span className="text-gray-400 font-normal">- Optional (defaults to now)</span></label>
                                    <input type="datetime-local" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 bg-gray-50 outline-none" value={manualTime} onChange={e => setManualTime(e.target.value)} />
                                </div>
                                <button
                                    disabled={!volume}
                                    onClick={() => saveFeed({ type: tab, volume })}
                                    className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 transition disabled:opacity-50">
                                    Save Feed
                                </button>
                            </div>

                    <h3 className="font-bold text-gray-800 mb-4">Recent Logs</h3>
                    <div className="space-y-3">
                        {feeds.slice(0, 10).map(f => (

                                <div className="flex items-center space-x-3">
                                    <div className={`p-2 rounded-lg ${f.type === 'breast' ? 'bg-pink-100 text-pink-600' : f.type === 'formula' ? 'bg-blue-100 text-blue-600' : 'bg-purple-100 text-purple-600'}`}>

                                    </div>

                                        <p className="font-semibold text-gray-800 capitalize">{f.type}</p>

                                    <div className="font-bold text-gray-700 text-right leading-tight">
                                        {f.type === 'breast' ? (
                                            <>
                                                <div>L:{Math.round(f.leftTime / 60)}m R:{Math.round(f.rightTime / 60)}m</div>
                                                {f.volume && <div className="text-xs text-pink-500">~{f.volume} ml est.</div>}

                                    <button onClick={() => deleteFeed(f.id)} className="w-8 h-8 rounded-full bg-red-50 text-red-500 font-bold flex items-center justify-center hover:bg-red-100 transition-colors">×</button>

        function DiaperTracker({ familyId, diapers }) {
            const [manualTime, setManualTime] = useState('');

            const saveDiaper = (type) => {
                const timestamp = manualTime ? new Date(manualTime).toISOString() : new Date().toISOString();
                db.collection('families').doc(familyId).collection('diapers').add({ type, timestamp });
                setManualTime('');
            };

            const deleteDiaper = (id) => {
                if (confirm('Delete this diaper log?')) {
                    db.collection('families').doc(familyId).collection('diapers').doc(id).delete();
                }
            };

            return (
                <div className="p-6 pb-24 h-full overflow-y-auto fade-in">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800">Diaper Log</h2>

                    <div className="mb-6">
                        <label className="block text-sm font-medium text-gray-700 mb-2">Custom Time <span className="text-gray-400 font-normal">- Optional (defaults to now)</span></label>
                        <input type="datetime-local" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 bg-white outline-none shadow-sm" value={manualTime} onChange={e => setManualTime(e.target.value)} />
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-8">
                        <button onClick={() => saveDiaper('wet')} className="bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 p-4 rounded-2xl flex flex-col items-center justify-center transition-all shadow-sm">
                            <span className="text-3xl mb-2">💧</span>
                            <span className="font-bold text-blue-700">Wet</span>
                        </button>
                        <button onClick={() => saveDiaper('dirty')} className="bg-amber-50 hover:bg-amber-100 border-2 border-amber-200 p-4 rounded-2xl flex flex-col items-center justify-center transition-all shadow-sm">
                            <span className="text-3xl mb-2">💩</span>
                            <span className="font-bold text-amber-700">Dirty</span>
                        </button>
                        <button onClick={() => saveDiaper('both')} className="bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-200 p-4 rounded-2xl flex flex-col items-center justify-center transition-all shadow-sm">
                            <span className="text-3xl mb-2">♻️</span>
                            <span className="font-bold text-emerald-700">Both</span>
                        </button>
                    </div>

                    <h3 className="font-bold text-gray-800 mb-4">Recent Changes</h3>
                    <div className="space-y-3">
                        {diapers.slice(0, 10).map(d => (
                            <div key={d.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-50 flex justify-between items-center">
                                <div className="flex items-center space-x-3">
                                    <div className="p-2 bg-yellow-100 text-yellow-600 rounded-lg">
                                        <IconDiaper className="w-5 h-5" />
                                    </div>
                                    <span className="font-semibold text-gray-800 capitalize">{d.type}</span>
                                </div>
                                <div className="flex items-center space-x-3">
                                    <span className="text-sm text-gray-500 font-medium">{timeAgo(d.timestamp)}</span>
                                    <button onClick={() => deleteDiaper(d.id)} className="w-8 h-8 rounded-full bg-red-50 text-red-500 font-bold flex items-center justify-center hover:bg-red-100 transition-colors">×</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function MaternalMeds({ familyId, medications, medLogs }) {
            const [showAdd, setShowAdd] = useState(false);
            const [name, setName] = useState('');
            const [dosage, setDosage] = useState('');
            const [frequency, setFrequency] = useState('');
            const [customMedTimes, setCustomMedTimes] = useState({});

            useEffect(() => { requestNotification(); }, []);

            const handleAdd = (e) => {
                e.preventDefault();
                db.collection('families').doc(familyId).collection('medications').add({
                    name,
                    dosage,
                    frequency: parseInt(frequency)
                });
                setShowAdd(false);
                setName(''); setDosage(''); setFrequency('');
            };

            const handleCustomTimeChange = (medId, val) => setCustomMedTimes({ ...customMedTimes, [medId]: val });

            const takeDose = (med) => {
                const chosenTimeStr = customMedTimes[med.id];
                const now = chosenTimeStr ? new Date(chosenTimeStr) : new Date();
                const nextTime = dateFns.addHours(now, med.frequency);

                db.collection('families').doc(familyId).collection('medLogs').add({
                    medId: med.id,
                    timestamp: now.toISOString(),
                    nextDoseTime: nextTime.toISOString()
                });

                setCustomMedTimes({ ...customMedTimes, [med.id]: '' });

                // Setup local notification timeout if app is open (Fallback)
                const msTillNext = nextTime.getTime() - Date.now();
                if (msTillNext > 0) {
                    setTimeout(() => {
                        notify(`${med.name} Due`, { body: `It's time to take your ${med.dosage} dose.`, icon: './icon.svg' });
                    }, msTillNext);
                }
            };

            return (
                <div className="p-6 pb-24 h-full overflow-y-auto fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-gray-800">Medications</h2>
                        <button onClick={() => setShowAdd(!showAdd)} className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center shadow hover:bg-indigo-200 transition">
                            <span className="text-2xl leading-none -mt-1">{showAdd ? '×' : '+'}</span>
                        </button>
                    </div>

                    {showAdd && (
                        <div className="bg-white p-5 rounded-2xl shadow-lg border border-indigo-50 mb-6 slide-up">
                            <h3 className="font-bold text-gray-800 mb-3">Add Medication</h3>
                            <form onSubmit={handleAdd} className="space-y-3">
                                <input required type="text" placeholder="Name (e.g. Paracetamol)" className="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500 bg-gray-50" value={name} onChange={e => setName(e.target.value)} />
                                <input required type="text" placeholder="Dosage (e.g. 500mg)" className="w-full p-3 rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500 bg-gray-50" value={dosage} onChange={e => setDosage(e.target.value)} />
                                <div className="flex items-center space-x-2">
                                    <span className="text-sm text-gray-600">Every</span>
                                    <input required type="number" placeholder="4" className="w-20 p-3 rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500 bg-gray-50" value={frequency} onChange={e => setFrequency(e.target.value)} />
                                    <span className="text-sm text-gray-600">hours</span>
                                </div>
                                <button type="submit" className="w-full py-3 bg-indigo-600 text-white font-bold rounded-lg shadow mt-2">Save</button>
                            </form>
                        </div>
                    )}

                    <div className="space-y-4">
                        {medications.map(med => {
                            const logs = medLogs.filter(l => l.medId === med.id).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                            const lastLog = logs[0];
                            const nextTime = lastLog ? new Date(lastLog.nextDoseTime) : null;
                            const dueNow = nextTime && dateFns.isPast(nextTime);

                            return (
                                <div key={med.id} className={`bg-white p-5 rounded-2xl shadow-sm border transition-all ${dueNow ? 'border-red-300 ring-4 ring-red-50' : 'border-gray-50'}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800">{med.name}</h3>
                                            <p className="text-sm text-gray-500">{med.dosage} • Every {med.frequency}h</p>
                                        </div>
                                        <div className={`px-3 py-1 rounded-full text-xs font-bold ${dueNow ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600'}`}>
                                            {nextTime ? (dueNow ? 'Due Now' : `Next: ${dateFns.format(nextTime, 'h:mm a')}`) : 'Not taken yet'}
                                        </div>
                                    </div>
                                    <div className="flex space-x-2 mb-3">
                                        <button
                                            onClick={() => takeDose(med)}
                                            className="flex-1 py-3 bg-indigo-50 text-indigo-700 font-bold rounded-xl border border-indigo-100 hover:bg-indigo-100 transition shadow-sm">
                                            Record Dose Taken
                                        </button>
                                        <button onClick={() => {
                                            if (confirm(`Delete ${med.name} and all its logs?`)) {
                                                db.collection('families').doc(familyId).collection('medications').doc(med.id).delete();
                                                // Note: Firebase doesn't auto-cascade delete collections. In a production app, we would write a cloud function or batch delete logs.
                                            }
                                        }} className="w-12 border border-red-100 bg-red-50 text-red-500 font-bold rounded-xl flex items-center justify-center hover:bg-red-100 transition shadow-sm" title="Delete Prescription">
                                            ×
                                        </button>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <span className="text-xs text-gray-500 whitespace-nowrap">Custom time?</span>
                                        <input type="datetime-local" className="flex-1 px-2 py-1 text-xs rounded-md border border-gray-200 outline-none focus:ring-1 focus:ring-indigo-300"
                                            value={customMedTimes[med.id] || ''}
                                            onChange={e => handleCustomTimeChange(med.id, e.target.value)}
                                        />
                                    </div>
                                    {lastLog && <p className="text-xs text-center text-gray-400 mt-3">Last taken: {timeAgo(lastLog.timestamp)}</p>}
                                    <div className="mt-4 border-t border-gray-100 pt-3">
                                        <h4 className="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wide">Recent Doses</h4>
                                        {logs.length === 0 ? (
                                            <p className="text-xs text-gray-400">No doses recorded yet.</p>
                                        ) : (
                                            <div className="space-y-2">
                                                {logs.slice(0, 5).map(log => (
                                                    <div key={log.id} className="flex justify-between items-center bg-gray-50 p-2 rounded-lg text-sm">
                                                        <span className="text-gray-600 font-medium">{dateFns.format(new Date(log.timestamp), 'MMM d, h:mm a')}</span>
                                                        <button
                                                            onClick={() => {
                                                                if (confirm('Delete this dose?')) {
                                                                    db.collection('families').doc(familyId).collection('medLogs').doc(log.id).delete();
                                                                }
                                                            }}
                                                            className="text-red-400 hover:text-red-600 font-bold px-2 py-0.5 rounded transition-colors"
                                                            title="Delete this dose"
                                                        >
                                                            ×
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                        {medications.length === 0 && !showAdd && (
                            <div className="text-center p-8 text-gray-400">
                                <div className="text-5xl mb-3 opacity-50">💊</div>
                                <p>No medications tracked yet.</p>
                            </div>
                        )}
                    </div>
                </div >
            );
        }

        function SummaryTracker({ feeds, diapers, medications, medLogs }) {
            // Keep local state for date selection to review history
            const [selectedDateStr, setSelectedDateStr] = useState(new Date().toISOString().split('T')[0]);

            const selectedDate = new Date(selectedDateStr);

            // Filter records for only the selected date
            const dayFeeds = feeds.filter(f => dateFns.isSameDay(new Date(f.timestamp), selectedDate));
            const dayDiapers = diapers.filter(d => dateFns.isSameDay(new Date(d.timestamp), selectedDate));
            const dayMedLogs = medLogs.filter(m => dateFns.isSameDay(new Date(m.timestamp), selectedDate));

            // Crunch numbers
            const totalMl = dayFeeds.reduce((sum, f) => f.volume ? sum + parseInt(f.volume) : sum, 0);
            const totalBreastfeedMins = dayFeeds.reduce((sum, f) => f.type === 'breast' ? sum + Math.round((f.leftTime + f.rightTime) / 60) : sum, 0);

            let wetCount = 0;
            let dirtyCount = 0;
            let bothCount = 0;

            dayDiapers.forEach(d => {
                if (d.type === 'wet') wetCount++;
                if (d.type === 'dirty') dirtyCount++;
                if (d.type === 'both') {
                    wetCount++;
                    dirtyCount++;
                    bothCount++;
                }
            });

            const exportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,Date & Time,Category,Type,Details\n";
                const allLogs = [];

                feeds.forEach(f => {
                    const detail = f.type === 'breast' ? `L:${Math.round(f.leftTime / 60)}m R:${Math.round(f.rightTime / 60)}m` + (f.volume ? ` (~${f.volume}ml est.)` : '') : `${f.volume} ml`;
                    allLogs.push({ time: new Date(f.timestamp), category: 'Feed', type: f.type, detail });
                });

                diapers.forEach(d => {
                    allLogs.push({ time: new Date(d.timestamp), category: 'Diaper', type: d.type, detail: '' });
                });

                medLogs.forEach(ml => {
                    const med = medications.find(m => m.id === ml.medId);
                    if (med) {
                        allLogs.push({ time: new Date(ml.timestamp), category: 'Medication', type: med.name, detail: med.dosage });
                    }
                });

                allLogs.sort((a, b) => b.time - a.time);

                allLogs.forEach(log => {
                    const timeStr = dateFns.format(log.time, 'MMM d, h:mm a').replace(/,/g, '');
                    csvContent += `${timeStr},${log.category},${log.type},${log.detail}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `baby_report_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="p-6 pb-24 h-full overflow-y-auto w-full bg-gray-50 fade-in">
                    <h2 className="text-2xl font-bold mb-4 text-gray-800">History Summary</h2>

                    <div className="mb-6">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Select Date</label>
                        <input
                            type="date"
                            className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 bg-white outline-none shadow-sm"
                            value={selectedDateStr}
                            onChange={(e) => setSelectedDateStr(e.target.value)}
                        />
                    </div>

                    <div className="space-y-6">
                        {/* Feed Summary Card */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-5">
                                <IconBottle className="w-24 h-24" />
                            </div>
                            <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center">
                                <span className="bg-teal-100 text-teal-600 p-1.5 rounded-lg mr-2 inline-block">
                                    <IconChartBar className="w-5 h-5" />
                                </span>
                                Feeding Summary
                            </h3>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-teal-50 rounded-2xl p-4">
                                    <p className="text-sm font-medium text-teal-700 mb-1">Total Volume</p>
                                    <p className="text-3xl font-black text-teal-900">{totalMl} <span className="text-sm">ml</span></p>
                                    <p className="text-xs text-teal-600 mt-1">{dayFeeds.filter(f => f.volume).length} recorded</p>
                                </div>
                                <div className="bg-pink-50 rounded-2xl p-4">
                                    <p className="text-sm font-medium text-pink-700 mb-1">Breastfed</p>
                                    <p className="text-3xl font-black text-pink-900">{totalBreastfeedMins} <span className="text-sm">min</span></p>
                                    <p className="text-xs text-pink-600 mt-1">{dayFeeds.filter(f => f.type === 'breast').length} sessions</p>
                                </div>
                            </div>
                        </div>

                        {/* Diaper Summary Card */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-5">
                                <IconDiaper className="w-24 h-24" />
                            </div>
                            <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center">
                                <span className="bg-yellow-100 text-yellow-600 p-1.5 rounded-lg mr-2 inline-block">
                                    <IconChartBar className="w-5 h-5" />
                                </span>
                                Diaper Summary
                            </h3>

                            <div className="flex space-x-4 mb-2">
                                <div className="flex-1 text-center bg-blue-50 py-3 rounded-xl border border-blue-100">
                                    <div className="text-2xl mb-1">💧</div>
                                    <div className="text-xl font-bold text-blue-900">{wetCount}</div>
                                    <div className="text-xs text-blue-600 font-medium">Wet</div>
                                </div>
                                <div className="flex-1 text-center bg-amber-50 py-3 rounded-xl border border-amber-100">
                                    <div className="text-2xl mb-1">💩</div>
                                    <div className="text-xl font-bold text-amber-900">{dirtyCount}</div>
                                    <div className="text-xs text-amber-700 font-medium">Dirty</div>
                                </div>
                            </div>
                            {bothCount > 0 && <p className="text-xs text-center text-gray-400 mt-2">({bothCount} of these were combined "Both" diapers)</p>}
                        </div>

                        {/* Medication Summary Card */}
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-5">
                                <IconPill className="w-24 h-24" />
                            </div>
                            <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center">
                                <span className="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg mr-2 inline-block">
                                    <IconChartBar className="w-5 h-5" />
                                </span>
                                Medication Summary
                            </h3>

                            {dayMedLogs.length === 0 ? (
                                <p className="text-sm text-gray-400">No medications logged on this date.</p>
                            ) : (
                                <div className="space-y-3">
                                    {dayMedLogs.map(log => {
                                        const med = medications.find(m => m.id === log.medId);
                                        return (
                                            <div key={log.id} className="flex justify-between items-center bg-indigo-50/50 p-3 rounded-xl">
                                                <div className="flex items-center space-x-3">
                                                    <span className="text-xl">💊</span>
                                                    <div>
                                                        <p className="font-bold text-gray-800 text-sm">{med?.name || 'Unknown'}</p>
                                                        <p className="text-xs text-gray-500">{med?.dosage || ''}</p>
                                                    </div>
                                                </div>
                                                <span className="text-sm font-medium text-indigo-600">{dateFns.format(new Date(log.timestamp), 'h:mm a')}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        <button onClick={exportCSV} className="w-full py-4 bg-gray-900 text-white font-bold rounded-2xl shadow-md hover:bg-gray-800 transition flex items-center justify-center">
                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Download Full History (CSV)
                        </button>
                    </div >
                </div >
            );
        }

        // ----- FIREBASE AUTH/SETUP SCREEN ----- //
        function FirebaseSetup({ onComplete }) {
            const [localFamilyId, setLocalFamilyId] = useState(() => getLocalStorage('bt_familyId', ''));
            const [status, setStatus] = useState('Checking config...');

            useEffect(() => {
                setStatus('Authenticating...');
                auth.signInAnonymously()
                    .then(() => {
                        if (localFamilyId) {
                            onComplete(localFamilyId);
                        } else {
                            setStatus('Waiting for Family ID...');
                        }
                    })
                    .catch((error) => {
                        console.error('Auth error', error);
                        // Fallback to local
                        if (error.code === 'auth/operation-not-allowed') {
                            setStatus('Error: Anonymous Auth is not enabled in your Firebase Console.');
                        } else {
                            setStatus(`Auth Error: ${error.message}`);
                        }
                    });
            }, []);

            const joinFamily = (e) => {
                e.preventDefault();
                if (localFamilyId) {
                    setLocalStorage('bt_familyId', localFamilyId);
                    onComplete(localFamilyId);
                }
            };

            const generateNew = () => {
                const newId = Math.random().toString(36).substring(2, 10).toUpperCase();
                setLocalFamilyId(newId);
                setLocalStorage('bt_familyId', newId);
                onComplete(newId);
            };

            return (
                <div className="p-8 h-full flex flex-col items-center justify-center bg-gray-50 text-center fade-in">
                    <div className="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mb-6">
                        <span className="text-4xl">Cloud</span>
                    </div>
                    <h2 className="text-2xl font-black text-gray-800 mb-2">Sync Devices</h2>
                    <p className="text-gray-500 mb-8">{status}</p>

                    {(status === 'Waiting for Family ID...') && (
                        <div className="w-full max-w-xs space-y-4">
                            <form onSubmit={joinFamily} className="flex flex-col space-y-3">
                                <input
                                    required
                                    type="text"
                                    placeholder="Enter Partner's Family ID"
                                    className="w-full p-4 rounded-xl border border-gray-200 text-center font-mono font-bold uppercase tracking-widest focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={localFamilyId}
                                    onChange={e => setLocalFamilyId(e.target.value.toUpperCase())}
                                />
                                <button type="submit" className="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-md">Join Family</button>
                            </form>
                            <div className="relative py-4">
                                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-300"></div></div>
                                <div className="relative flex justify-center"><span className="px-2 bg-gray-50 text-sm text-gray-500">OR</span></div>
                            </div>
                            <button onClick={generateNew} className="w-full py-4 bg-white text-blue-600 border-2 border-blue-600 font-bold rounded-xl">Create New Family ID</button>
                        </div>
                    )}
                </div>
            );
        }

        // ----- MAIN CONTAINER APP ----- //
        function App() {
            const [familyId, setFamilyId] = useState('');
            const [profile, setProfile] = useState(null);
            const [feeds, setFeeds] = useState([]);
            const [diapers, setDiapers] = useState([]);
            const [medications, setMedications] = useState([]);
            const [medLogs, setMedLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [firebaseLoading, setFirebaseLoading] = useState(true);

            // Listen to Firestore once Family ID is set
            useEffect(() => {
                if (!familyId || !db) return;

                const familyRef = db.collection('families').doc(familyId);

                // Profile Snapshot
                const unsubProfile = familyRef.onSnapshot(doc => {
                    if (doc.exists && doc.data().profile) {
                        setProfile(doc.data().profile);
                    }
                    setFirebaseLoading(false); // Stop block after initial read
                });

                // Feeds Snapshot
                const unsubFeeds = familyRef.collection('feeds').orderBy('timestamp', 'desc').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setFeeds(data);
                });

                // Diapers Snapshot
                const unsubDiapers = familyRef.collection('diapers').orderBy('timestamp', 'desc').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setDiapers(data);
                });

                // Medications Snapshot
                const unsubMeds = familyRef.collection('medications').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setMedications(data);
                });

                // MedLogs Snapshot
                const unsubMedLogs = familyRef.collection('medLogs').orderBy('timestamp', 'desc').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setMedLogs(data);
                });

                return () => {
                    unsubProfile();
                    unsubFeeds();
                    unsubDiapers();
                    unsubMeds();
                    unsubMedLogs();
                };
            }, [familyId]);

            // Background notification checker loop
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    medications.forEach(med => {
                        const logs = medLogs.filter(l => l.medId === med.id).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        if (logs.length > 0) {
                            const lastLog = logs[0];
                            const dueTime = new Date(lastLog.nextDoseTime);
                            // Check if due within the current minute
                            const diff = dueTime.getTime() - now.getTime();
                            if (diff > 0 && diff <= 60000 && !lastLog.notified) {
                                notify('Medication Due!', { body: `It's time to take your ${med.name} (${med.dosage}).`, icon: './icon.svg' });
                                // Mark as notified so we don't spam
                                const updatedLogs = medLogs.map(l => l.id === lastLog.id ? { ...l, notified: true } : l);
                                setMedLogs(updatedLogs);
                            }
                        }
                    });
                }, 30000);
                return () => clearInterval(interval);
            }, [medications, medLogs]);

            if (!familyId) {
                return <FirebaseSetup onComplete={setFamilyId} />;
            }
            if (firebaseLoading) {
                return (
                    <div className="flex items-center justify-center p-8 h-full bg-gray-50">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                );
            }

            if (!profile) {
                const saveProfile = (prof) => db.collection('families').doc(familyId).set({ profile: prof }, { merge: true });
                return <Onboarding onSave={saveProfile} />;
            }

            return (
                <div className="flex flex-col h-full relative">
                    {/* Dynamic View rendering */}
                    <div className="flex-1 overflow-hidden relative">
                        {activeTab === 'dashboard' && <Dashboard profile={profile} feeds={feeds} diapers={diapers} medications={medications} medLogs={medLogs} />}
                        {activeTab === 'feed' && <FeedTracker familyId={familyId} feeds={feeds} />}
                        {activeTab === 'diaper' && <DiaperTracker familyId={familyId} diapers={diapers} />}
                        {activeTab === 'meds' && <MaternalMeds familyId={familyId} medications={medications} medLogs={medLogs} />}
                        {activeTab === 'summary' && <SummaryTracker feeds={feeds} diapers={diapers} medications={medications} medLogs={medLogs} />}
                    </div>

                    {/* Bottom Nav */}
                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 safe-area-bottom pb-4 pt-2 px-6 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50 rounded-t-3xl text-gray-400">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 transition-colors duration-300 ${activeTab === 'dashboard' ? 'text-blue-600 scale-110' : 'hover:text-blue-500'}`}>
                            <IconHome className="w-6 h-6" />
                            <span className="text-[10px] font-semibold mt-1">Home</span>
                        </button>
                        <button onClick={() => setActiveTab('feed')} className={`flex flex-col items-center p-2 transition-colors duration-300 ${activeTab === 'feed' ? 'text-teal-500 scale-110' : 'hover:text-teal-400'}`}>
                            <IconBottle className="w-6 h-6" />
                            <span className="text-[10px] font-semibold mt-1">Feed</span>
                        </button>
                        <button onClick={() => setActiveTab('summary')} className={`flex flex-col items-center p-2 transition-colors duration-300 ${activeTab === 'summary' ? 'text-purple-500 scale-110' : 'hover:text-purple-400'}`}>
                            <IconChartBar className="w-6 h-6" />
                            <span className="text-[10px] font-semibold mt-1">Summary</span>
                        </button>
                        <button onClick={() => setActiveTab('diaper')} className={`flex flex-col items-center p-2 transition-colors duration-300 ${activeTab === 'diaper' ? 'text-yellow-500 scale-110' : 'hover:text-yellow-400'}`}>
                            <IconDiaper className="w-6 h-6" />
                            <span className="text-[10px] font-semibold mt-1">Diaper</span>
                        </button>
                        <button onClick={() => setActiveTab('meds')} className={`flex flex-col items-center p-2 transition-colors duration-300 ${activeTab === 'meds' ? 'text-indigo-500 scale-110' : 'hover:text-indigo-400'}`}>
                            <IconPill className="w-6 h-6" />
                            <span className="text-[10px] font-semibold mt-1">Meds</span>
                        </button>
                    </div>

                    <style dangerouslySetInnerHTML={{
                        __html: `
                .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
            `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
